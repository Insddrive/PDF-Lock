<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Secure Lock PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            max-width: 450px; 
            width: 100%; 
        }
        h2 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 20px; 
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        label { 
            display: block; 
            margin-bottom: 5px; 
            color: #666; 
            font-weight: 600; 
        }
        input[type="text"], input[type="file"] { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px; 
        }
        button:hover { 
            background-color: #0056b3; 
        }
        #status { 
            text-align: center; 
            margin-top: 15px; 
            font-weight: bold; 
            color: green; 
            white-space: pre-line;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>PDF ਦੋਹਰਾ ਪਾਸਵਰਡ ਸਿਸਟਮ</h2>
    
    <div class="form-group">
        <label>PDF ਫਾਈਲ ਚੁਣੋ:</label>
        <input type="file" id="pdfFile" accept=".pdf">
    </div>

    <div class="form-group">
        <label>ਪਾਸਵਰਡ A (ਸਿਰਫ਼ ਦੇਖਣ ਲਈ):</label>
        <input type="text" id="userPassword" placeholder="ਜਿਵੇਂ: Wahe1@">
    </div>

    <div class="form-group">
        <label>ਪਾਸਵਰਡ B (ਪ੍ਰਿੰਟ/ਐਡਿਟ ਮਾਸਟਰ ਕੀ):</label>
        <input type="text" id="ownerPassword" placeholder="ਜਿਵੇਂ: Wahe2@">
    </div>

    <button onclick="securePDF()">PDF ਸੁਰੱਖਿਅਤ ਕਰੋ ਅਤੇ ਡਾਊਨਲੋਡ ਕਰੋ</button>
    <div id="status"></div>
</div>

<script src="app.js"></script>
<script>
    // Service Worker ਰਜਿਸਟਰ ਕਰਨ ਲਈ ਕੋਡ
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker ਸਫ਼ਲਤਾਪੂਰਵਕ ਰਜਿਸਟਰ ਹੋ ਗਿਆ ਹੈ'))
          .catch(err => console.log('Service Worker ਰਜਿਸਟਰੇਸ਼ਨ ਫੇਲ੍ਹ ਹੋਈ:', err));
      });
    }
</script>
</body>
</html>
